server {
    listen 80;

    location /odoo-api/ {
        proxy_pass https://srv.seishin.com.mx/;
        proxy_set_header Host srv.seishin.com.mx;
        proxy_ssl_server_name on;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
